	Buildable:
		IconPalette:
		Queue: Ship.UCS
		BuildDuration: 175
		BuildPaletteOrder: 30
		Prerequisites: HeavyRockets
		Description: Submarine armed with heavy rocket launchers.\nCan target air units.
	Selectable:
		Bounds: 1344, 976, 0, 0
	Health:
		HP: 800
	Mobile:
		Speed: 50
	RevealsShroud:
		Range: 6c896
	Armament@PRIMARY:
		Name: primary
		Weapon: ucs_ships_orca
		LocalOffset: 250,-75,150,   250,75,150
		MuzzleSequence: smoke_primary
		MuzzlePalette:
	Armament@SECONDARY:
		Name: secondary
		Weapon: ucs_ships_orca_air
		LocalOffset: 100,-75,150,   100,75,150
		MuzzleSequence: smoke_secondary
		MuzzlePalette:
	AttackFrontal:
		Armaments: primary
	AttackFrontal@Secondary:
		Armaments: secondary
		FacingTolerance: 512
	WithMuzzleOverlay:
	-Cloak:
	-ExternalCondition:
	Cloak@Underwater:
		CloakType: UnderwaterCloak
		EffectPalette:
		CloakedCondition: cloaked
		CloakDelay: 105
	SpawnActorOnDeath:
		Actor: ucs_ships_orca_husk
	LeavesTrails:
		RequiresCondition: !cloaked
	Encyclopedia:
		Category: UCS - Ships
		Order: 3
		Animation: content/ucs/ships/orca/orca_wireframe.png
		Title: ORCA - Submarine
		Armor: Medium
		Armament: Two heavy surface-to-surface rocket firing bays and two air-to-air missile launchers.
		Description: Equipped with heavy rocket launch bays and light air-to-air missile launchers, the ORCA is the mainline shore-bombardment platform. RUSS 3 submarines were effective in their role as main naval combat units against ED vessels. However, once enemy presence was removed at sea, the UCS arsenal did not have any proper way to exploit weaknesses in heavily defended shore lines. That is where the oceanic ranged covert attack vessels, also known as ORCAs, entered the picture. \n\nORCA submarines were nuclear class submarines that roamed the oceans from an immemorial times, always ready to fire their strategic payload. Fully automated, some of these underwater hulks were recalled to manufacturing facilities to be refit in order to serve the ever-changing battlefield of the century.

ucs_ships_orca_husk:
	Inherits@1: ^Husk
	Inherits@2: ^HuskBurnsSmallFire
	Tooltip:
		Name: Husk (ORCA)
